parameters:
  paths:
    - ./app
  layers:
    - name: Domain
      collectors:
        - type: directory
          value: app/Domain/.*
    - name: Application
      collectors:
        - type: directory
          value: app/Application/.*
    - name: Infrastructure
      collectors:
        - type: directory
          value: app/Infrastructure/.*
  ruleset:
    Domain: []
    Application:
      - Domain
    Infrastructure:
      - Application
      - Domain
