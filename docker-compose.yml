services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: php artisan serve --host=0.0.0.0 --port=80
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: yttscrb
      DB_USERNAME: yttscrb
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      WORKFLOW_CONNECTION: redis
      TRANSCRIPTION_PROVIDER: groq
      SUMMARY_PROVIDER: openai
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: php artisan queue:work redis --queue=default --sleep=1 --tries=3 --timeout=0
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: yttscrb
      DB_USERNAME: yttscrb
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      WORKFLOW_CONNECTION: redis
      TRANSCRIPTION_PROVIDER: groq
      SUMMARY_PROVIDER: openai
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  horizon:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: yttscrb
      DB_USERNAME: yttscrb
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      WORKFLOW_CONNECTION: redis
      TRANSCRIPTION_PROVIDER: groq
      SUMMARY_PROVIDER: openai
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yttscrb
      POSTGRES_USER: yttscrb
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yttscrb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
