apiVersion: v1
kind: Secret
metadata:
  name: yttscrb-secrets
type: Opaque
stringData:
  # APP_KEY must be a valid base64:... string (32 bytes decoded).
  # Generate with: php artisan key:generate --show
  APP_KEY: "base64:YOUR_GENERATED_KEY_HERE"
  # DB_PASSWORD must match postgresql.auth.password in values.yaml
  DB_PASSWORD: "secret"
  # API keys for transcription & summary providers
  GROQ_API_KEY: "YOUR_GROQ_API_KEY"
  OPENAI_API_KEY: "YOUR_OPENAI_API_KEY"
  # Do NOT add REDIS_PASSWORD — redis.auth.enabled is false in values.yaml.
  # Adding REDIS_PASSWORD will cause Horizon and Worker to fail with
  # "ERR AUTH <password> called without any password configured".
