apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yttscrb.fullname" . }}-app
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "yttscrb.fullname" . }}-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "yttscrb.fullname" . }}-app
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: {{ include "yttscrb.fullname" . }}-config
            - secretRef:
                name: {{ .Values.app.secrets.existingSecret }}
