image:
  repository: registry.example.com/yttscrb/app
  tag: latest
  pullPolicy: IfNotPresent

app:
  replicas: 2
  env:
    APP_ENV: production
    DB_CONNECTION: pgsql
    QUEUE_CONNECTION: redis
    TRANSCRIPTION_PROVIDER: groq
    SUMMARY_PROVIDER: openai
  secrets:
    existingSecret: yttscrb-secrets

horizon:
  replicas: 1

temporalWorker:
  replicas: 1

service:
  port: 80

ingress:
  enabled: true
  className: nginx
  host: yttscrb.example.com
  tlsSecretName: yttscrb-tls

postgresql:
  enabled: true
  auth:
    database: yttscrb
    username: yttscrb

redis:
  enabled: true

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
