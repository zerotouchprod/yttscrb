image:
  repository: ghcr.io/zerotouchprod/yttscrb
  tag: latest
  pullPolicy: IfNotPresent

app:
  replicas: 2
  env:
    APP_ENV: production
    APP_URL: http://ytt.aividup.com
    DB_CONNECTION: pgsql
    DB_HOST: yttscrb-postgresql
    DB_PORT: "5432"
    REDIS_HOST: yttscrb-redis-master
    REDIS_PORT: "6379"
    QUEUE_CONNECTION: redis
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    WORKFLOW_CONNECTION: redis
    TRANSCRIPTION_PROVIDER: groq
    SUMMARY_PROVIDER: openai
  secrets:
    existingSecret: yttscrb-secrets

imagePullSecrets:
  - name: ghcr-creds

horizon:
  replicas: 1

worker:
  replicas: 1

service:
  port: 80

ingress:
  enabled: true
  className: traefik
  host: ytt.aividup.com
  tlsSecretName: ""

postgresql:
  enabled: true
  auth:
    database: yttscrb
    username: yttscrb
    password: secret

redis:
  enabled: true
  auth:
    enabled: false

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
