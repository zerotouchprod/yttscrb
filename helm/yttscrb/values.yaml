image:
  repository: ghcr.io/zerotouchprod/yttscrb
  tag: latest
  pullPolicy: IfNotPresent

global:
  security:
    allowInsecureImages: true

app:
  replicas: 2
  command:
    - /bin/sh
    - -lc
  args:
    - >-
      until php -r "exit((int)!@fsockopen(getenv('DB_HOST'), (int)getenv('DB_PORT')));";
      do echo 'waiting for postgres'; sleep 3; done;
      until php -r "exit((int)!@fsockopen(getenv('REDIS_HOST'), (int)getenv('REDIS_PORT')));";
      do echo 'waiting for redis'; sleep 3; done;
      rm -f .env &&
      php -r "
      \$key = getenv('APP_KEY');
      if (!\$key || !str_starts_with(\$key, 'base64:')) { echo 'FATAL: APP_KEY missing or invalid format (expected base64:...)'.PHP_EOL; exit(1); }
      \$decoded = base64_decode(substr(\$key, 7));
      if (strlen(\$decoded) !== 32) { echo 'FATAL: APP_KEY decodes to '.strlen(\$decoded).' bytes, expected 32'.PHP_EOL; exit(1); }
      echo 'APP_KEY OK'.PHP_EOL;
      " &&
      cp -n vendor/durable-workflow/workflow/src/migrations/* database/migrations/ 2>/dev/null &&
      php artisan migrate --force &&
      nohup php artisan schedule:work > /proc/1/fd/1 2>&1 &
      php artisan serve --host=0.0.0.0 --port=80
  env:
    APP_ENV: production
    APP_URL: https://tubesum.app
    DB_CONNECTION: pgsql
    DB_HOST: yttscrb-postgresql
    DB_PORT: "5432"
    DB_DATABASE: yttscrb
    DB_USERNAME: yttscrb
    REDIS_HOST: yttscrb-redis-master
    REDIS_PORT: "6379"
    REDIS_CLUSTER: "false"
    QUEUE_CONNECTION: redis
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    LOG_CHANNEL: errorlog
    LOG_LEVEL: error
    WORKFLOW_CONNECTION: redis
    TRANSCRIPTION_PROVIDER: groq
    SUMMARY_PROVIDER: openai
    SENTRY_RELEASE: ""
    YT_DLP_COOKIES_PATH: "/app/cookies/cookies.txt"
    YT_DLP_COOLDOWN_FAILURE_THRESHOLD: "5"
    YT_DLP_COOLDOWN_DURATION_SEC: "300"
    YTDLP_PROXY_URL: ""
    YTDLP_POTOKEN_URL: ""
  secrets:
    existingSecret: yttscrb-secrets

imagePullSecrets:
  - name: ghcr-creds

horizon:
  replicas: 1
  command:
    - /bin/sh
    - -lc
  args:
    - >-
      until php -r "exit((int)!@fsockopen(getenv('DB_HOST'), (int)getenv('DB_PORT')));";
      do echo 'waiting for postgres'; sleep 3; done;
      until php -r "exit((int)!@fsockopen(getenv('REDIS_HOST'), (int)getenv('REDIS_PORT')));";
      do echo 'waiting for redis'; sleep 3; done;
      php artisan horizon

worker:
  replicas: 1
  command:
    - /bin/sh
    - -lc
  args:
    - >-
      until php -r "exit((int)!@fsockopen(getenv('DB_HOST'), (int)getenv('DB_PORT')));";
      do echo 'waiting for postgres'; sleep 3; done;
      until php -r "exit((int)!@fsockopen(getenv('REDIS_HOST'), (int)getenv('REDIS_PORT')));";
      do echo 'waiting for redis'; sleep 3; done;
      php artisan queue:work redis --queue=default --sleep=1 --tries=3 --timeout=0

service:
  port: 80

ingress:
  enabled: true
  className: traefik
  host: tubesum.app
  tlsSecretName: ""

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r14
  auth:
    database: yttscrb
    username: yttscrb
    password: secret

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 7.4.3-debian-12-r0
  auth:
    enabled: false
  master:
    resources:
      limits:
        memory: 2Gi
      requests:
        memory: 512Mi
  replica:
    resources:
      limits:
        memory: 2Gi
      requests:
        memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
